<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1.1 工程项目投资管理与实施 - 练习题</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  color: #2d3748;
}
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 16px;
}
/* 顶部状态栏 */
.top-bar {
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  backdrop-filter: blur(10px);
}
.top-bar h1 {
  font-size: 18px;
  color: #4a5568;
  margin-bottom: 14px;
  font-weight: 600;
}
.stats-row {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.progress-info {
  flex: 1;
  min-width: 200px;
}
.progress-text {
  font-size: 14px;
  color: #718096;
  margin-bottom: 6px;
}
.progress-text span { font-weight: 700; color: #5a67d8; }
.progress-bar-bg {
  width: 100%;
  height: 8px;
  background: #e2e8f0;
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 4px;
  transition: width 0.5s ease;
  width: 0%;
}
.score-box {
  display: flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #f6ad55, #ed8936);
  color: white;
  padding: 8px 18px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  white-space: nowrap;
}
.score-box .label { font-weight: 400; font-size: 13px; opacity: 0.9; }
.jump-select {
  padding: 8px 12px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  font-size: 14px;
  color: #4a5568;
  background: #f7fafc;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}
.jump-select:focus { border-color: #667eea; }
/* 题目卡片 */
.question-card {
  background: rgba(255,255,255,0.97);
  border-radius: 16px;
  padding: 28px 28px 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
}
.q-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.q-badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: white;
}
.q-badge.single { background: linear-gradient(135deg, #48bb78, #38a169); }
.q-badge.multi { background: linear-gradient(135deg, #4299e1, #3182ce); }
.q-score {
  font-size: 12px;
  color: #a0aec0;
}
.q-number {
  font-size: 15px;
  font-weight: 700;
  color: #4a5568;
  margin-bottom: 14px;
}
.q-text {
  font-size: 16px;
  line-height: 1.75;
  color: #2d3748;
  margin-bottom: 20px;
}
/* 选项 */
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
}
.option:hover { border-color: #a3bffa; background: #f7faff; }
.option.selected { border-color: #5a67d8; background: #ebf4ff; }
.option.correct { border-color: #48bb78; background: #f0fff4; }
.option.wrong { border-color: #fc8181; background: #fff5f5; }
.option.reveal-correct { border-color: #48bb78; background: #f0fff4; }
.option.disabled { pointer-events: none; }
.opt-label {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  border: 2px solid #cbd5e0;
  color: #718096;
  transition: all 0.2s;
}
.option.selected .opt-label { background: #5a67d8; color: white; border-color: #5a67d8; }
.option.correct .opt-label { background: #48bb78; color: white; border-color: #48bb78; }
.option.wrong .opt-label { background: #fc8181; color: white; border-color: #fc8181; }
.option.reveal-correct .opt-label { background: #48bb78; color: white; border-color: #48bb78; }
.opt-text { font-size: 15px; line-height: 1.6; padding-top: 2px; color: #4a5568; }
.opt-icon {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 4px;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: white;
  margin-left: auto;
}
.option.correct .opt-icon { display: flex; background: #48bb78; }
.option.wrong .opt-icon { display: flex; background: #fc8181; }
/* 解析区域 */
.explanation {
  margin-top: 20px;
  padding: 18px 20px;
  border-radius: 12px;
  background: #f7fafc;
  border-left: 4px solid #5a67d8;
  display: none;
  animation: fadeIn 0.3s ease;
}
.explanation.show { display: block; }
.explanation .exp-title {
  font-size: 14px; font-weight: 700; color: #5a67d8; margin-bottom: 8px;
}
.explanation .exp-answer { font-size: 15px; color: #2d3748; margin-bottom: 6px; }
.explanation .exp-answer span { font-weight: 700; }
.explanation .exp-score { font-size: 14px; color: #718096; }
.explanation .exp-knowledge { font-size: 14px; color: #553c9a; margin-top: 10px; line-height: 1.7; padding: 10px 14px; background: #faf5ff; border-radius: 8px; border-left: 3px solid #9f7aea; }
.explanation .exp-knowledge .kp-title { font-weight: 700; color: #6b46c1; }
.explanation .exp-memory { font-size: 14px; color: #975a16; margin-top: 10px; line-height: 1.7; padding: 10px 14px; background: #fffff0; border-radius: 8px; border-left: 3px solid #ecc94b; }
.explanation .exp-memory .mm-title { font-weight: 700; color: #975a16; }
.explanation .exp-page { font-size: 13px; color: #a0aec0; margin-top: 6px; }
/* 按钮区域 */
.btn-area {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  justify-content: flex-end;
}
.btn {
  padding: 12px 32px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: #fff;
  color: #e53e3e;
  border: 2px solid #fed7d7;
}
.btn-secondary:hover { background: #fff5f5; border-color: #fc8181; }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
/* 完成页面 */
.finish-card {
  background: rgba(255,255,255,0.97);
  border-radius: 16px;
  padding: 48px 32px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  text-align: center;
  display: none;
}
.finish-card.show { display: block; }
.finish-card .trophy { font-size: 64px; margin-bottom: 16px; }
.finish-card h2 { font-size: 24px; color: #2d3748; margin-bottom: 8px; }
.finish-card .final-score { font-size: 48px; font-weight: 800; color: #5a67d8; margin: 16px 0; }
.finish-card .final-detail { font-size: 14px; color: #718096; margin-bottom: 24px; line-height: 1.8; }
.finish-card .btn { margin: 0 auto; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
/* 反馈弹窗 */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white;
  border-radius: 16px;
  padding: 32px;
  width: 90%;
  max-width: 460px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: fadeIn 0.25s ease;
}
.modal h3 { font-size: 18px; color: #2d3748; margin-bottom: 16px; }
.modal textarea {
  width: 100%;
  height: 120px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  padding: 12px;
  font-size: 14px;
  resize: vertical;
  outline: none;
  font-family: inherit;
}
.modal textarea:focus { border-color: #667eea; }
.modal-btns {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 16px;
}
.modal-btns .btn { padding: 10px 24px; font-size: 14px; }
/* 错题汇总弹窗 */
.review-modal {
  background: white;
  border-radius: 16px;
  padding: 0;
  width: 92%;
  max-width: 600px;
  max-height: 80vh;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: fadeIn 0.25s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.review-modal .review-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.review-modal .review-header h3 { margin-bottom: 0; font-size: 18px; color: #e53e3e; }
.review-modal .review-close {
  width: 32px; height: 32px;
  border: none; background: #f7fafc;
  border-radius: 50%; font-size: 18px;
  cursor: pointer; color: #718096;
  display: flex; align-items: center; justify-content: center;
}
.review-modal .review-close:hover { background: #edf2f7; }
.review-modal .review-list {
  padding: 16px 24px 24px;
  overflow-y: auto;
  flex: 1;
}
.review-item {
  background: #fff5f5;
  border: 1px solid #fed7d7;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.review-item:last-child { margin-bottom: 0; }
.review-item .ri-q {
  font-size: 14px;
  font-weight: 600;
  color: #2d3748;
  margin-bottom: 8px;
  line-height: 1.6;
}
.review-item .ri-row {
  font-size: 13px;
  margin-bottom: 4px;
  line-height: 1.5;
}
.review-item .ri-user { color: #e53e3e; }
.review-item .ri-correct { color: #38a169; }
.review-item .ri-kp {
  font-size: 12px;
  color: #718096;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed #fed7d7;
  line-height: 1.6;
}
.review-empty {
  text-align: center;
  padding: 40px 20px;
  color: #38a169;
  font-size: 18px;
}
.fb-item {
  background: #fffff0;
  border: 1px solid #fefcbf;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.fb-item:last-child { margin-bottom: 0; }
.fb-item .fb-q {
  font-size: 14px;
  font-weight: 600;
  color: #2d3748;
  margin-bottom: 8px;
  line-height: 1.6;
}
.fb-item .fb-content {
  font-size: 13px;
  color: #c05621;
  background: rgba(237, 137, 54, 0.08);
  padding: 10px 14px;
  border-radius: 8px;
  line-height: 1.6;
}
/* 密码登录层 */
.password-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s ease;
}
.password-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.password-card {
  background: white;
  border-radius: 20px;
  padding: 40px 36px;
  width: 90%;
  max-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  text-align: center;
}
.password-card .lock-icon { font-size: 48px; margin-bottom: 16px; }
.password-card h2 { font-size: 20px; color: #2d3748; margin-bottom: 6px; }
.password-card p { font-size: 14px; color: #a0aec0; margin-bottom: 24px; }
.password-card input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 16px;
  text-align: center;
  letter-spacing: 4px;
  outline: none;
  transition: border-color 0.2s;
}
.password-card input:focus { border-color: #667eea; }
.password-card .pw-error { color: #e53e3e; font-size: 13px; margin-top: 10px; min-height: 20px; }
.password-card .pw-btn {
  margin-top: 16px;
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.password-card .pw-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
.password-card .pw-btn:active { transform: translateY(0); }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
</style>
</head>
<body>

<!-- 密码验证层 -->
<div class="password-overlay" id="passwordOverlay">
  <div class="password-card">
    <div class="lock-icon">🔒</div>
    <h2>请输入访问密码</h2>
    <p>本页面仅限授权用户使用</p>
    <input type="password" id="pwInput" placeholder="请输入密码" autocomplete="off">
    <div class="pw-error" id="pwError"></div>
    <button class="pw-btn" onclick="checkPassword()">进 入</button>
  </div>
</div>

<div class="container">
  <!-- 顶部状态栏 -->
  <div class="top-bar">
    <h1>📐 1.1 工程项目投资管理与实施</h1>
    <div class="stats-row">
      <div class="progress-info">
        <div class="progress-text">做题进度：<span id="currentNum">1</span> / <span id="totalNum">10</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
      </div>
      <div class="score-box"><span class="label">得分</span><span id="scoreDisplay">0</span></div>
      <select class="jump-select" id="jumpSelect" title="跳转到指定题目"></select>
    </div>
  </div>

  <!-- 题目卡片 -->
  <div class="question-card" id="questionCard">
    <div class="q-header">
      <span class="q-badge" id="qBadge">单选题</span>
      <span class="q-score" id="qScoreText"></span>
    </div>
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation" id="explanation">
      <div class="exp-title">📝 解析</div>
      <div class="exp-answer" id="expAnswer"></div>
      <div class="exp-score" id="expScore"></div>
      <div class="exp-knowledge" id="expKnowledge"></div>
      <div class="exp-memory" id="expMemory"></div>
      <div class="exp-page" id="expPage"></div>
    </div>
    <div class="btn-area">
      <button class="btn btn-secondary" id="feedbackBtn" style="display:none" onclick="openFeedback()">⚠️ 题目/答案反馈</button>
      <button class="btn btn-primary" id="confirmBtn" onclick="confirmAnswer()">确定</button>
    </div>
  </div>

  <!-- 完成页面 -->
  <div class="finish-card" id="finishCard">
    <div class="trophy">🎉</div>
    <h2>练习完成！</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="final-detail" id="finalDetail"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-secondary" id="reviewBtn" onclick="openReview()" style="margin:0">❌ 查看错题</button>
      <button class="btn btn-secondary" id="feedbackSummaryBtn" onclick="openFeedbackSummary()" style="margin:0;display:none">⚠️ 反馈汇总</button>
      <button class="btn btn-primary" onclick="resetQuiz()" style="margin:0">🔄 重新做题</button>
    </div>
  </div>
</div>

<!-- 反馈弹窗 -->
<div class="modal-overlay" id="feedbackModal">
  <div class="modal">
    <h3>⚠️ 题目/答案反馈</h3>
    <p style="font-size:14px;color:#718096;margin-bottom:12px;">请描述您认为有误的题目或答案，我们会尽快核实修正。</p>
    <textarea id="feedbackText" placeholder="请输入您发现的问题..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeFeedback()">取消</button>
      <button class="btn btn-primary" onclick="submitFeedback()">提交</button>
    </div>
  </div>
</div>

<!-- 错题汇总弹窗 -->
<div class="modal-overlay" id="reviewModal">
  <div class="review-modal">
    <div class="review-header">
      <h3>❌ 错题汇总</h3>
      <button class="review-close" onclick="closeReview()">✕</button>
    </div>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>

<!-- 反馈汇总弹窗 -->
<div class="modal-overlay" id="feedbackSummaryModal">
  <div class="review-modal">
    <div class="review-header">
      <h3>⚠️ 反馈汇总</h3>
      <button class="review-close" onclick="closeFeedbackSummary()">✕</button>
    </div>
    <div class="review-list" id="feedbackSummaryList"></div>
  </div>
</div>

<script>
const questions = [
  {
    type: 'single',
    question: '项目资本金是指在项目总投资中由投资者认缴的出资额，对银行等金融机构而言，项目资本金可视为项目法人进行（）的信用基础。',
    options: ['股权融资', '债务融资', '债券融资', '租赁融资'],
    answer: [1],
    page: '教材第2页',
    knowledge: '【项目资本金的性质】项目资本金属于非债务性资金，项目法人不承担这部分资金的任何利息和债务。投资者可按其出资比例依法享有所有者权益，也可转让其出资，但不得以任何方式抽回。对于银行等金融机构或资本市场的投资者而言，项目资本金可视为项目法人进行债务融资的信用基础。',
    memory: '【口诀】"资本金，非债务，不付利息不还款；可转让，不可撤，银行看它当信用。"\n关键词串联：认缴出资 → 非债务性 → 不担利息债务 → 可转让不可抽回 → 债务融资信用基础。联想记忆：银行贷款给项目，就像你买房付首付一样，首付比例越高银行越放心。',
    explanation: '项目资本金属于非债务性资金，项目法人不承担这部分资金的任何利息和债务。对于银行等金融机构或资本市场的投资者而言，项目资本金可视为项目法人进行债务融资的信用基础。'
  },
  {
    type: 'single',
    question: '除国家对采用高新技术成果有特别规定外，以工业产权、非专利技术作价出资的比例不得超过投资项目资本金总额的（）。',
    options: ['10%', '20%', '25%', '30%'],
    answer: [1],
    page: '教材第2页',

const optLabels = ['A', 'B', 'C', 'D', 'E'];
let currentQ = 0;
let score = 0;
let answered = new Array(questions.length).fill(false);
let userAnswers = new Array(questions.length).fill(null);
let revealed = new Array(questions.length).fill(false);
let feedbackList = []; // 存储所有反馈 { questionNum, questionText, feedback }

// ====== 密码验证 ======
// ⬇️ 在这里修改你的密码（建议改成复杂一点的）
const ACCESS_PASSWORD = '123456';

function checkPassword() {
  const input = document.getElementById('pwInput');
  const error = document.getElementById('pwError');
  if (input.value === ACCESS_PASSWORD) {
    document.getElementById('passwordOverlay').classList.add('hidden');
    document.body.style.overflow = '';
    // 记住登录状态（当天有效）
    sessionStorage.setItem('quiz_auth', '1');
  } else {
    error.textContent = '密码错误，请重新输入';
    input.value = '';
    input.focus();
    // 抖动效果
    const card = document.querySelector('.password-card');
    card.style.animation = 'none';
    card.offsetHeight; // 触发重绘
    card.style.animation = 'shake 0.4s ease';
  }
}

// 回车键提交
document.addEventListener('keydown', function(e) {
  if (!sessionStorage.getItem('quiz_auth') && e.key === 'Enter') {
    checkPassword();
  }
});

// 页面加载时检查是否已登录
(function() {
  if (sessionStorage.getItem('quiz_auth')) {
    document.getElementById('passwordOverlay').classList.add('hidden');
  } else {
    document.getElementById('pwInput').focus();
    // 禁止滚动
    document.body.style.overflow = 'hidden';
  }
})();

function init() {
  const sel = document.getElementById('jumpSelect');
  sel.innerHTML = '';
  questions.forEach((q, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `第 ${i + 1} 题（${q.type === 'single' ? '单选' : '多选'}）`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => jumpTo(parseInt(sel.value)));
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const card = document.getElementById('questionCard');
  const finish = document.getElementById('finishCard');
  
  // Check if all answered
  if (answered.every(a => a)) {
    card.style.display = 'none';
    finish.classList.add('show');
    document.getElementById('finalScore').textContent = score + ' 分';
    const total = questions.reduce((s, q) => s + (q.type === 'single' ? 1 : 2), 0);
    let correctCount = 0;
    let wrongCount = 0;
    answered.forEach((a, i) => {
      const ua = userAnswers[i];
      const ca = questions[i].answer;
      if (JSON.stringify(ua) === JSON.stringify(ca)) correctCount++;
      else wrongCount++;
    });
    document.getElementById('finalDetail').innerHTML = 
      `总分：${total} 分 | 答对：${correctCount} 题 | 答错：${wrongCount} 题<br>` +
      `正确率：${(correctCount / questions.length * 100).toFixed(0)}%`;
    document.getElementById('reviewBtn').style.display = wrongCount > 0 ? 'inline-block' : 'none';
    document.getElementById('feedbackSummaryBtn').style.display = feedbackList.length > 0 ? 'inline-block' : 'none';
    return;
  }

  card.style.display = 'block';
  finish.classList.remove('show');

  // Badge
  const badge = document.getElementById('qBadge');
  badge.textContent = q.type === 'single' ? '单选题' : '多选题';
  badge.className = 'q-badge ' + (q.type === 'single' ? 'single' : 'multi');
  
  document.getElementById('qScoreText').textContent = q.type === 'single' ? '选对得 1 分' : '选对一个 0.5 分，全对得 2 分';
  document.getElementById('qNumber').textContent = `第 ${currentQ + 1} 题`;
  document.getElementById('qText').textContent = q.question;

  // Options
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.index = i;
    
    const selected = userAnswers[currentQ] && userAnswers[currentQ].includes(i);
    if (selected && !revealed[currentQ]) div.classList.add('selected');
    
    div.innerHTML = `
      <span class="opt-label">${optLabels[i]}</span>
      <span class="opt-text">${opt}</span>
      <span class="opt-icon"></span>
    `;
    div.addEventListener('click', () => toggleOption(i));
    container.appendChild(div);
  });

  // If already answered, show result
  if (revealed[currentQ]) {
    showResult();
  }

  // Buttons
  const confirmBtn = document.getElementById('confirmBtn');
  const feedbackBtn = document.getElementById('feedbackBtn');
  
  if (revealed[currentQ]) {
    confirmBtn.textContent = '下一题 ▶';
    confirmBtn.disabled = false;
    feedbackBtn.style.display = 'inline-block';
    disableAllOptions();
  } else {
    confirmBtn.textContent = '确定';
    const sel = userAnswers[currentQ];
    confirmBtn.disabled = !sel || sel.length === 0;
    feedbackBtn.style.display = 'none';
  }

  // Explanation
  const exp = document.getElementById('explanation');
  if (!revealed[currentQ]) {
    exp.classList.remove('show');
    document.getElementById('expKnowledge').style.display = 'none';
    document.getElementById('expMemory').style.display = 'none';
  }

  // Progress
  const answeredCount = answered.filter(a => a).length;
  document.getElementById('currentNum').textContent = answeredCount;
  document.getElementById('progressBar').style.width = (answeredCount / questions.length * 100) + '%';
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('jumpSelect').value = currentQ;
}

function toggleOption(index) {
  if (revealed[currentQ]) return;
  
  const q = questions[currentQ];
  let sel = userAnswers[currentQ] ? [...userAnswers[currentQ]] : [];
  
  if (q.type === 'single') {
    sel = [index];
  } else {
    // Multi: can't select all 5
    const idx = sel.indexOf(index);
    if (idx > -1) {
      sel.splice(idx, 1);
    } else {
      if (sel.length >= 4) return; // max 4 selections for multi
      sel.push(index);
    }
  }
  
  userAnswers[currentQ] = sel;
  
  // Update UI
  const options = document.querySelectorAll('.option');
  options.forEach((opt, i) => {
    opt.classList.remove('selected', 'correct', 'wrong', 'reveal-correct');
    if (sel.includes(i)) opt.classList.add('selected');
  });

  document.getElementById('confirmBtn').disabled = sel.length === 0;
}

function confirmAnswer() {
  if (revealed[currentQ]) {
    // Next question
    nextQuestion();
    return;
  }

  const q = questions[currentQ];
  const sel = userAnswers[currentQ];
  if (!sel || sel.length === 0) return;

  answered[currentQ] = true;
  revealed[currentQ] = true;

  // Calculate score
  const correct = q.answer;
  let isCorrect = JSON.stringify(sel.slice().sort()) === JSON.stringify(correct.slice().sort());
  let earned = 0;
  
  if (q.type === 'single') {
    earned = isCorrect ? 1 : 0;
  } else {
    if (isCorrect) {
      earned = 2;
    } else {
      // Check if any selected is wrong
      let hasWrong = sel.some(s => !correct.includes(s));
      if (hasWrong) {
        earned = 0;
      } else {
        earned = sel.length * 0.5;
      }
    }
  }
  
  score += earned;
  
  showResult();
  renderQuestion();
}

function showResult() {
  const q = questions[currentQ];
  const sel = userAnswers[currentQ];
  const correct = q.answer;
  const options = document.querySelectorAll('.option');
  
  const selSorted = (sel || []).slice().sort();
  const correctSorted = correct.slice().sort();
  const isCorrect = JSON.stringify(selSorted) === JSON.stringify(correctSorted);
  
  let earned = 0;
  if (q.type === 'single') {
    earned = isCorrect ? 1 : 0;
  } else {
    if (isCorrect) earned = 2;
    else {
      let hasWrong = (sel || []).some(s => !correct.includes(s));
      earned = hasWrong ? 0 : (sel || []).length * 0.5;
    }
  }

  options.forEach((opt, i) => {
    opt.classList.remove('selected', 'correct', 'wrong', 'reveal-correct');
    if (sel && sel.includes(i) && correct.includes(i)) {
      opt.classList.add('correct');
      opt.querySelector('.opt-icon').textContent = '✓';
    } else if (sel && sel.includes(i) && !correct.includes(i)) {
      opt.classList.add('wrong');
      opt.querySelector('.opt-icon').textContent = '✗';
    } else if (correct.includes(i) && !(sel && sel.includes(i))) {
      opt.classList.add('reveal-correct');
      opt.querySelector('.opt-icon').textContent = '✓';
    }
  });

  const exp = document.getElementById('explanation');
  const correctLetters = correct.map(i => optLabels[i]).join('');
  document.getElementById('expAnswer').innerHTML = `正确答案：<span>${correctLetters}</span>`;
  document.getElementById('expScore').textContent = isCorrect 
    ? (q.type === 'multi' ? '🎉 全部正确！得分：+2 分' : '🎉 回答正确！得分：+1 分')
    : `得分：+${earned} 分${earned === 0 ? '（存在错误选项）' : ''}`;
  document.getElementById('expPage').textContent = '📖 ' + q.page;
  const kpEl = document.getElementById('expKnowledge');
  if (q.knowledge) {
    kpEl.innerHTML = '<span class="kp-title">📌 知识点：</span>' + q.knowledge;
    kpEl.style.display = 'block';
  } else {
    kpEl.style.display = 'none';
  }
  const mmEl = document.getElementById('expMemory');
  if (q.memory) {
    mmEl.innerHTML = '<span class="mm-title">💡 记忆技巧：</span>' + q.memory.replace(/\n/g, '<br>');
    mmEl.style.display = 'block';
  } else {
    mmEl.style.display = 'none';
  }
  exp.classList.add('show');
}

function disableAllOptions() {
  document.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));
}

function nextQuestion() {
  // Find next unanswered
  let next = -1;
  for (let i = currentQ + 1; i < questions.length; i++) {
    if (!answered[i]) { next = i; break; }
  }
  if (next === -1) {
    for (let i = 0; i < currentQ; i++) {
      if (!answered[i]) { next = i; break; }
    }
  }
  if (next === -1) next = (currentQ + 1) % questions.length;
  currentQ = next;
  renderQuestion();
}

function jumpTo(index) {
  currentQ = index;
  renderQuestion();
}

function openFeedback() {
  document.getElementById('feedbackModal').classList.add('show');
  document.getElementById('feedbackText').value = '';
  document.getElementById('feedbackText').focus();
}

function closeFeedback() {
  document.getElementById('feedbackModal').classList.remove('show');
}

function openReview() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  let hasWrong = false;
  
  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const ca = q.answer;
    const isCorrect = JSON.stringify(ua) === JSON.stringify(ca);
    if (isCorrect) return;
    hasWrong = true;
    
    const userLetters = (ua || []).map(idx => optLabels[idx]).join('');
    const correctLetters = ca.map(idx => optLabels[idx]).join('');
    
    const item = document.createElement('div');
    item.className = 'review-item';
    let html = `<div class="ri-q">第 ${i + 1} 题（${q.type === 'single' ? '单选' : '多选'}）：${q.question}</div>`;
    html += `<div class="ri-row ri-user">❌ 你的答案：${userLetters || '未作答'}</div>`;
    html += `<div class="ri-row ri-correct">✅ 正确答案：${correctLetters}</div>`;
    if (q.knowledge) {
      html += `<div class="ri-kp">📌 ${q.knowledge}</div>`;
    }
    if (q.page) {
      html += `<div class="ri-kp">📖 ${q.page}</div>`;
    }
    if (q.memory) {
      html += `<div class="ri-kp">💡 记忆技巧：${q.memory}</div>`;
    }
    item.innerHTML = html;
    
    // 点击跳转到该题
    item.style.cursor = 'pointer';
    item.addEventListener('click', () => {
      closeReview();
      currentQ = i;
      renderQuestion();
    });
    
    list.appendChild(item);
  });
  
  if (!hasWrong) {
    list.innerHTML = '<div class="review-empty">🎉 全部正确，没有错题！</div>';
  }
  
  document.getElementById('reviewModal').classList.add('show');
}

function closeReview() {
  document.getElementById('reviewModal').classList.remove('show');
}

function openFeedbackSummary() {
  const list = document.getElementById('feedbackSummaryList');
  list.innerHTML = '';
  if (feedbackList.length === 0) {
    list.innerHTML = '<div class="review-empty">暂无反馈</div>';
  } else {
    feedbackList.forEach(fb => {
      const item = document.createElement('div');
      item.className = 'fb-item';
      item.innerHTML = `
        <div class="fb-q">第 ${fb.questionNum} 题：${fb.questionText}</div>
        <div class="fb-content">💬 ${fb.feedback}</div>
      `;
      list.appendChild(item);
    });
  }
  document.getElementById('feedbackSummaryModal').classList.add('show');
}

function closeFeedbackSummary() {
  document.getElementById('feedbackSummaryModal').classList.remove('show');
}

function submitFeedback() {
  const text = document.getElementById('feedbackText').value.trim();
  if (!text) { alert('请输入反馈内容'); return; }
  feedbackList.push({
    questionNum: currentQ + 1,
    questionText: questions[currentQ].question,
    feedback: text
  });
  alert('感谢您的反馈！我们已记录第 ' + (currentQ + 1) + ' 题的问题，会尽快核实修正。');
  closeFeedback();
}

function resetQuiz() {
  currentQ = 0;
  score = 0;
  answered = new Array(questions.length).fill(false);
  userAnswers = new Array(questions.length).fill(null);
  revealed = new Array(questions.length).fill(false);
  document.getElementById('finishCard').classList.remove('show');
  renderQuestion();
}

init();
</script>
</body>
</html>
